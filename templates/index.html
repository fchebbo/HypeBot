<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HypeBot</title>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #ff2d2d;
      --red-dim: #991a1a;
      --bg:      #0a0a0a;
      --surface: #111111;
      --border:  #222222;
      --text:    #f0f0f0;
      --muted:   #555555;
      --green:   #00ff88;
      --mono:    'DM Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      gap: 40px;
    }

    /* ── header ── */
    .header { text-align: center; }

    .logo {
      font-family: var(--display);
      font-size: clamp(64px, 12vw, 120px);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
      position: relative;
      display: inline-block;
    }
    .logo span { color: var(--red); }
    .logo::after {
      content: '⚡';
      position: absolute;
      top: -12px;
      right: -32px;
      font-size: 0.35em;
      animation: zap 2s ease-in-out infinite;
    }
    @keyframes zap {
      0%, 100% { opacity: 1; transform: scale(1) rotate(-5deg); }
      50%       { opacity: 0.4; transform: scale(0.85) rotate(5deg); }
    }
    .tagline {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 32px;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--red);
    }

    /* ── mode tabs ── */
    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .mode-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 15px;
      letter-spacing: 0.1em;
      padding: 6px 18px 8px;
      transition: color 0.15s, border-color 0.15s;
    }
    .mode-tab.active { color: var(--text); border-bottom-color: var(--red); }
    .mode-tab:hover { color: var(--text); }

    /* ── input rows ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--red); }

    .go-btn {
      background: var(--red);
      border: none;
      border-radius: 2px;
      color: #fff;
      cursor: pointer;
      font-family: var(--display);
      font-size: 18px;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .go-btn:hover  { background: #ff4444; }
    .go-btn:active { transform: scale(0.97); }
    .go-btn:disabled {
      background: var(--red-dim);
      cursor: not-allowed;
      transform: none;
    }

    .browse-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--display);
      font-size: 15px;
      letter-spacing: 0.08em;
      padding: 12px 18px;
      transition: border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .browse-btn:hover { border-color: var(--muted); }

    /* ── drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 2px;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: default;
      transition: border-color 0.15s, color 0.15s;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .drop-zone.drag-over {
      border-color: var(--red);
      color: var(--text);
    }
    .drop-zone.uploading {
      border-color: var(--red);
      color: var(--text);
    }
    .drop-zone-sub {
      font-size: 10px;
      margin-top: 6px;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }
    .drop-progress-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      width: 0%;
      background: var(--red);
      transition: width 0.1s linear;
    }

    /* ── progress bar ── */
    .progress-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-bottom: 20px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .progress-wrap.active { opacity: 1; }
    .progress-bar {
      height: 100%;
      width: 100%;
      background: var(--red);
      animation: indeterminate 1.4s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%) scaleX(0.5); }
      50%  { transform: translateX(50%)   scaleX(0.8); }
      100% { transform: translateX(200%)  scaleX(0.4); }
    }

    /* ── log ── */
    .log-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .log-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px;
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.7;
      color: var(--green);
      scroll-behavior: smooth;
    }
    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-line { display: block; }
    .log-line.error { color: var(--red); }

    /* ── done banner ── */
    .done-banner {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border: 1px solid var(--green);
      border-radius: 2px;
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-align: center;
    }
    .done-banner.show { display: block; }

    /* ── review trigger ── */
    .review-trigger {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: underline;
      text-decoration-color: var(--border);
      padding: 0;
      transition: color 0.15s;
    }
    .review-trigger:hover { color: var(--text); }

    /* ── review section ── */
    .review {
      width: 100%;
      max-width: 960px;
      display: none;
    }
    .review.show { display: block; }

    .review-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .section-heading {
      font-family: var(--display);
      font-size: 32px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .session-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    .session-tab {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .session-tab.active { border-color: var(--red); color: var(--text); }
    .session-tab:hover { color: var(--text); }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px 10px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── clips grid ── */
    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
    }

    .clip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .clip-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--red);
      z-index: 1;
    }

    .clip-video-wrap {
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
    }
    .clip-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .clip-footer {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .clip-name {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .clip-toggle { display: flex; gap: 6px; }
    .toggle-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .toggle-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .toggle-btn:hover:not(.active) { color: var(--text); border-color: var(--muted); }

    .empty-state {
      color: var(--muted);
      font-size: 12px;
      padding: 60px 20px;
      text-align: center;
      grid-column: 1 / -1;
      letter-spacing: 0.1em;
    }

    /* ── clip states ── */
    .clip-card[data-state="flagged"] { border-color: #FFD700; }
    .clip-card[data-state="flagged"]::before { background: #FFD700; }
    .clip-card[data-state="skipped"] { opacity: 0.35; filter: grayscale(0.4); }
    .clip-card[data-state="done"]    { border-color: var(--green); }
    .clip-card[data-state="done"]::before { background: var(--green); }

    .state-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-family: var(--display);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 2px;
      z-index: 2;
    }
    .badge-flagged { background: #FFD700; color: #000; }
    .badge-done    { background: var(--green); color: #000; }

    .state-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      transition: all 0.15s;
    }
    .state-btn:hover { color: var(--text); border-color: var(--muted); }
    .state-btn.flag-active  { background: #FFD700; border-color: #FFD700; color: #000; }
    .state-btn.skip-active  { background: var(--muted); border-color: var(--muted); color: #fff; }

    /* ── filter bar ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 13px;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { border-color: var(--red); color: var(--text); }

    /* ── text panel ── */
    .text-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .text-panel.open { display: flex; }

    .hook-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .hook-input::placeholder { color: var(--muted); }
    .hook-input:focus { border-color: var(--red); }

    .render-btn {
      background: var(--red);
      border: none;
      border-radius: 2px;
      color: #fff;
      cursor: pointer;
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.08em;
      padding: 7px 0;
      transition: background 0.15s;
      width: 100%;
    }
    .render-btn:hover { background: #ff4444; }
    .render-btn:disabled { background: var(--red-dim); cursor: not-allowed; }

    .render-status {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--green);
      display: none;
    }
    .render-status.show { display: block; }
    .render-status.err  { color: var(--red); }

    /* ── finals section ── */
    .grid-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 0 10px;
      grid-column: 1 / -1;
    }

    /* ── archived section ── */
    .archived-section {
      width: 100%;
      max-width: 960px;
    }
    .archived-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.1em;
      padding: 6px 16px;
      transition: color 0.15s, border-color 0.15s;
    }
    .archived-toggle:hover { color: var(--text); border-color: var(--muted); }
    .archived-toggle.has-items { color: var(--text); }

    .archived-list {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .archived-list.open { display: block; }

    .archived-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .archived-row:last-child { border-bottom: none; }
    .archived-row:hover { background: var(--surface); }

    .restore-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--display);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .restore-btn:hover { color: var(--text); border-color: var(--muted); }

    .final-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--green);
      color: #000;
      font-family: var(--display);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 2px;
      z-index: 2;
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="logo">HYPE<span>BOT</span></div>
    <p class="tagline">Smash Ultimate · Auto Clipper · Shorts Generator</p>
  </header>

  <div class="card">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabUrl" onclick="setMode('url')">URL</button>
      <button class="mode-tab" id="tabFile" onclick="setMode('file')">LOCAL FILE</button>
    </div>

    <div class="input-row" id="urlRow">
      <input
        id="urlInput"
        class="url-input"
        type="text"
        placeholder="Paste YouTube or Twitch URL..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="goBtn" class="go-btn" onclick="startPipeline()">GENERATE</button>
    </div>

    <div class="input-row" id="fileRow" style="display:none">
      <input
        id="fileInput"
        class="url-input"
        type="text"
        placeholder="Select a video file..."
        autocomplete="off"
        spellcheck="false"
        readonly
      />
      <button class="browse-btn" onclick="browseFile()">BROWSE</button>
      <button id="goBtnFile" class="go-btn" onclick="startPipeline()">GENERATE</button>
    </div>

    <div id="dropZone" class="drop-zone" style="display:none">
      <div id="dropZoneText">DROP VIDEO FILE HERE</div>
      <div class="drop-zone-sub" id="dropZoneSub">mp4 · mkv · avi · mov</div>
      <div class="drop-progress-bar" id="dropProgressBar"></div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"></div>
    </div>

    <div class="log-label">Log</div>
    <div class="log-box" id="logBox"></div>

    <div class="done-banner" id="doneBanner">✅ &nbsp; Clips generated — scroll down to review</div>
  </div>

  <button class="review-trigger" onclick="loadClips(null)">Review previous clips ↓</button>

  <div class="archived-section" id="archivedSection" style="display:none">
    <button class="archived-toggle" id="archivedToggle" onclick="toggleArchived()">ARCHIVED (0)</button>
    <div class="archived-list" id="archivedList"></div>
  </div>

  <section class="review" id="reviewSection">
    <div class="review-top">
      <span class="section-heading">CLIPS</span>
      <div class="session-tabs" id="sessionTabs"></div>
      <button class="icon-btn" onclick="loadClips(null)" title="Refresh">↻</button>
      <button class="icon-btn" id="archiveBtn" onclick="archiveSession()" title="Archive current session" style="font-size:14px;letter-spacing:0.06em;font-family:var(--display)">ARCHIVE</button>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all"        onclick="setFilter('all')">ALL</button>
      <button class="filter-btn"        data-filter="flagged"    onclick="setFilter('flagged')">⭐ FLAGGED</button>
      <button class="filter-btn"        data-filter="unreviewed" onclick="setFilter('unreviewed')">UNREVIEWED</button>
      <button class="filter-btn"        data-filter="skipped"    onclick="setFilter('skipped')">SKIPPED</button>
    </div>
    <div class="clips-grid" id="clipsGrid">
      <div class="empty-state">No clips found.</div>
    </div>
    <div class="clips-grid" id="finalsGrid" style="display:none"></div>
  </section>

</div>

<script>
  let eventSource = null;
  let currentMode = 'url';
  let allSessions = [];
  let currentSessionIdx = 0;
  let currentFilter = 'all';

  // ── mode toggle ──────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('tabUrl').classList.toggle('active', mode === 'url');
    document.getElementById('tabFile').classList.toggle('active', mode === 'file');
    document.getElementById('urlRow').style.display  = mode === 'url'  ? 'flex' : 'none';
    document.getElementById('fileRow').style.display = mode === 'file' ? 'flex' : 'none';
    document.getElementById('dropZone').style.display = mode === 'file' ? 'block' : 'none';
  }

  // ── drag & drop upload ────────────────────────────────────────
  (function initDropZone() {
    const zone    = document.getElementById('dropZone');
    const text    = document.getElementById('dropZoneText');
    const sub     = document.getElementById('dropZoneSub');
    const bar     = document.getElementById('dropProgressBar');
    const input   = document.getElementById('fileInput');
    const allowed = new Set(['mp4','mkv','avi','mov','webm']);

    function ext(name) { return name.split('.').pop().toLowerCase(); }

    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (!allowed.has(ext(file.name))) {
        text.textContent = '⚠  Not a video file';
        sub.textContent  = 'Drop an mp4, mkv, avi, or mov';
        return;
      }
      uploadFile(file);
    });

    function uploadFile(file) {
      zone.classList.add('uploading');
      text.textContent = `Uploading ${file.name}…`;
      sub.textContent  = '';
      bar.style.width  = '0%';

      const fd  = new FormData();
      fd.append('file', file);
      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          bar.style.width = Math.round(e.loaded / e.total * 100) + '%';
        }
      });

      xhr.addEventListener('load', () => {
        zone.classList.remove('uploading');
        bar.style.width = '100%';
        try {
          const data = JSON.parse(xhr.responseText);
          if (data.path) {
            input.value     = data.path;
            text.textContent = '✅  ' + file.name;
            sub.textContent  = 'Ready — click GENERATE';
          } else {
            text.textContent = '❌  Upload failed';
            sub.textContent  = data.error || '';
          }
        } catch {
          text.textContent = '❌  Upload error';
        }
        setTimeout(() => { bar.style.width = '0%'; }, 1000);
      });

      xhr.addEventListener('error', () => {
        zone.classList.remove('uploading');
        text.textContent = '❌  Upload failed';
        sub.textContent  = '';
      });

      xhr.open('POST', '/upload');
      xhr.send(fd);
    }
  })();

  // ── file browse ──────────────────────────────────────────────
  async function browseFile() {
    const res = await fetch('/browse');
    const data = await res.json();
    if (data.path) {
      document.getElementById('fileInput').value = data.path;
    }
  }

  // ── pipeline ─────────────────────────────────────────────────
  function startPipeline() {
    const isFile = currentMode === 'file';
    const value  = isFile
      ? document.getElementById('fileInput').value.trim()
      : document.getElementById('urlInput').value.trim();

    if (!value) return;

    const btn      = isFile ? document.getElementById('goBtnFile') : document.getElementById('goBtn');
    const logBox   = document.getElementById('logBox');
    const progress = document.getElementById('progressWrap');
    const banner   = document.getElementById('doneBanner');

    btn.disabled = true;
    btn.textContent = 'WORKING...';
    logBox.innerHTML = '';
    progress.classList.add('active');
    banner.classList.remove('show');

    if (eventSource) eventSource.close();

    eventSource = new EventSource('/logs');
    eventSource.onmessage = (e) => {
      const msg = e.data;
      if (msg === '__keepalive__') return;

      if (msg.startsWith('__done__')) {
        eventSource.close();
        btn.disabled = false;
        btn.textContent = 'GENERATE';
        progress.classList.remove('active');
        banner.classList.add('show');

        const session = msg.includes(':') ? msg.split(':').slice(1).join(':') : null;
        loadClips(session);
        return;
      }

      const line = document.createElement('span');
      line.className = 'log-line' + (msg.includes('❌') || msg.includes('⚠️') ? ' error' : '');
      line.textContent = msg;
      logBox.appendChild(line);
      logBox.appendChild(document.createElement('br'));
      logBox.scrollTop = logBox.scrollHeight;
    };

    const body = isFile ? { path: value } : { url: value };
    fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }

  // ── clip review ───────────────────────────────────────────────
  async function loadClips(autoSession) {
    const res  = await fetch('/clips-list');
    const data = await res.json();
    allSessions = data.sessions;
    renderArchived(data.archived || []);

    renderSessionTabs();

    const review = document.getElementById('reviewSection');
    review.classList.add('show');

    if (allSessions.length === 0) {
      document.getElementById('clipsGrid').innerHTML =
        '<div class="empty-state">No clips found. Generate some first.</div>';
      return;
    }

    let idx = 0;
    if (autoSession) {
      const found = allSessions.findIndex(s => s.title === autoSession);
      if (found >= 0) idx = found;
    }

    selectSession(idx);
    review.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderSessionTabs() {
    const tabs = document.getElementById('sessionTabs');
    tabs.innerHTML = '';
    allSessions.forEach((session, i) => {
      const btn = document.createElement('button');
      btn.className = 'session-tab';
      btn.textContent = session.title;
      btn.title = session.title;
      btn.addEventListener('click', () => selectSession(i));
      tabs.appendChild(btn);
    });
  }

  function selectSession(idx) {
    currentSessionIdx = idx;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === 'all');
    });
    document.querySelectorAll('.session-tab').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
    renderClips(allSessions[idx]);
  }

  // ── filter ───────────────────────────────────────────────────
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    applyFilter();
  }

  function applyFilter() {
    document.querySelectorAll('#clipsGrid .clip-card').forEach(card => {
      const state = card.dataset.state || 'default';
      let show = true;
      if (currentFilter === 'flagged')    show = state === 'flagged';
      if (currentFilter === 'unreviewed') show = state === 'default';
      if (currentFilter === 'skipped')    show = state === 'skipped';
      card.style.display = show ? '' : 'none';
    });
  }

  function renderClips(session) {
    const grid       = document.getElementById('clipsGrid');
    const finalsGrid = document.getElementById('finalsGrid');
    grid.innerHTML       = '';
    finalsGrid.innerHTML = '';
    finalsGrid.style.display = 'none';

    if (!session || (!session.clips.length && !session.finals.length)) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No clips in this session.';
      grid.appendChild(empty);
      return;
    }

    if (session.clips.length) {
      session.clips.forEach(clip => grid.appendChild(makeClipCard(clip)));
      applyFilter();
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No source clips.';
      grid.appendChild(empty);
    }

    if (session.finals && session.finals.length) {
      const label = document.createElement('div');
      label.className = 'grid-label';
      label.textContent = 'Finals';
      finalsGrid.style.display = 'grid';
      finalsGrid.appendChild(label);
      session.finals.forEach(path => finalsGrid.appendChild(makeFinalCard(path)));
    }
  }

  async function setClipState(session, clipName, newState, card, flagBtn, skipBtn) {
    await fetch(`/review-state/${encodeURIComponent(session)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clip: clipName, state: newState }),
    });

    // Keep in-memory session data in sync so switching sessions preserves state
    const sessionObj = allSessions.find(s => s.title === session);
    if (sessionObj) {
      const clip = sessionObj.clips.find(c => c.name === clipName);
      if (clip) clip.state = newState;
    }
    card.dataset.state = newState;

    // Update badge
    const existing = card.querySelector('.state-badge');
    if (existing) existing.remove();
    if (newState === 'flagged') {
      const b = document.createElement('div');
      b.className = 'state-badge badge-flagged';
      b.textContent = '⭐ FLAGGED';
      card.insertBefore(b, card.firstChild);
    }

    flagBtn.className = 'state-btn' + (newState === 'flagged' ? ' flag-active' : '');
    skipBtn.className = 'state-btn' + (newState === 'skipped' ? ' skip-active' : '');
    applyFilter();
  }

  function encodePath(p) {
    return p.split('/').map(encodeURIComponent).join('/');
  }

  function makeVideoEl(src) {
    const video = document.createElement('video');
    video.src = '/clips-serve/' + encodePath(src);
    video.controls = true;
    video.preload = 'metadata';
    video.playsInline = true;
    return video;
  }

  function makeClipCard(clip) {
    const session = allSessions[currentSessionIdx].title;
    const card = document.createElement('div');
    card.className = 'clip-card';
    card.dataset.state = clip.state || 'default';

    // ── state badge ──
    if (clip.state === 'flagged') {
      const b = document.createElement('div');
      b.className = 'state-badge badge-flagged';
      b.textContent = '⭐ FLAGGED';
      card.appendChild(b);
    } else if (clip.state === 'done') {
      const b = document.createElement('div');
      b.className = 'state-badge badge-done';
      b.textContent = '✓ DONE';
      card.appendChild(b);
    }

    const wrap = document.createElement('div');
    wrap.className = 'clip-video-wrap';
    const video = makeVideoEl(clip.vertical);
    wrap.appendChild(video);

    const footer = document.createElement('div');
    footer.className = 'clip-footer';

    const nameEl = document.createElement('span');
    nameEl.className = 'clip-name';
    nameEl.textContent = formatClipName(clip.name);
    footer.appendChild(nameEl);

    // ── source toggle ──
    const toggle = document.createElement('div');
    toggle.className = 'clip-toggle';

    const vertBtn = document.createElement('button');
    vertBtn.className = 'toggle-btn active';
    vertBtn.textContent = 'VERT';
    vertBtn.addEventListener('click', () => {
      video.src = '/clips-serve/' + encodePath(clip.vertical);
      video.load();
      vertBtn.classList.add('active');
      if (origBtn) origBtn.classList.remove('active');
    });
    toggle.appendChild(vertBtn);

    let origBtn = null;
    if (clip.original) {
      origBtn = document.createElement('button');
      origBtn.className = 'toggle-btn';
      origBtn.textContent = '16:9';
      origBtn.addEventListener('click', () => {
        video.src = '/clips-serve/' + encodePath(clip.original);
        video.load();
        origBtn.classList.add('active');
        vertBtn.classList.remove('active');
      });
      toggle.appendChild(origBtn);
    }

    // ── flag / skip ──
    if (clip.state !== 'done') {
      const flagBtn = document.createElement('button');
      flagBtn.className = 'state-btn' + (clip.state === 'flagged' ? ' flag-active' : '');
      flagBtn.textContent = '⭐';
      flagBtn.title = 'Flag';
      flagBtn.addEventListener('click', async () => {
        const newState = card.dataset.state === 'flagged' ? 'default' : 'flagged';
        await setClipState(session, clip.name, newState, card, flagBtn, skipBtn, null);
      });

      const skipBtn = document.createElement('button');
      skipBtn.className = 'state-btn' + (clip.state === 'skipped' ? ' skip-active' : '');
      skipBtn.textContent = '✕';
      skipBtn.title = 'Skip';
      skipBtn.addEventListener('click', async () => {
        const newState = card.dataset.state === 'skipped' ? 'default' : 'skipped';
        await setClipState(session, clip.name, newState, card, flagBtn, skipBtn, null);
      });

      toggle.appendChild(flagBtn);
      toggle.appendChild(skipBtn);
    }

    // ── add text toggle ──
    const addTextBtn = document.createElement('button');
    addTextBtn.className = 'toggle-btn';
    addTextBtn.textContent = 'ADD TEXT';
    addTextBtn.style.marginLeft = 'auto';
    addTextBtn.addEventListener('click', () => {
      const open = textPanel.classList.toggle('open');
      addTextBtn.classList.toggle('active', open);
    });
    toggle.appendChild(addTextBtn);

    footer.appendChild(toggle);

    // ── text panel ──
    const textPanel = document.createElement('div');
    textPanel.className = 'text-panel';

    const aboveInput = document.createElement('input');
    aboveInput.className = 'hook-input';
    aboveInput.placeholder = 'ABOVE text (optional)';

    const belowInput = document.createElement('input');
    belowInput.className = 'hook-input';
    belowInput.placeholder = 'BELOW text (optional)';

    const renderBtn = document.createElement('button');
    renderBtn.className = 'render-btn';
    renderBtn.textContent = 'RENDER';

    const status = document.createElement('div');
    status.className = 'render-status';

    renderBtn.addEventListener('click', async () => {
      renderBtn.disabled = true;
      renderBtn.textContent = 'RENDERING...';
      status.className = 'render-status';
      status.style.display = 'none';

      try {
        const res = await fetch('/render-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            clip:  clip.vertical,
            above: aboveInput.value.trim(),
            below: belowInput.value.trim(),
          }),
        });
        const data = await res.json();
        if (data.ok) {
          status.textContent = '✅  Final saved.';
          status.className = 'render-status show';
          const currentTitle = allSessions[currentSessionIdx]?.title;
          const r2 = await fetch('/clips-list');
          const d2 = await r2.json();
          allSessions = d2.sessions;
          renderSessionTabs();
          const newIdx = allSessions.findIndex(s => s.title === currentTitle);
          selectSession(newIdx >= 0 ? newIdx : 0);
          document.getElementById('finalsGrid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          status.textContent = '❌  Render failed.';
          status.className = 'render-status show err';
        }
      } catch (e) {
        status.textContent = '❌  Request failed.';
        status.className = 'render-status show err';
      }

      renderBtn.disabled = false;
      renderBtn.textContent = 'RENDER';
    });

    textPanel.appendChild(aboveInput);
    textPanel.appendChild(belowInput);
    textPanel.appendChild(renderBtn);
    textPanel.appendChild(status);
    footer.appendChild(textPanel);

    card.appendChild(wrap);
    card.appendChild(footer);
    return card;
  }

  function makeFinalCard(path) {
    const card = document.createElement('div');
    card.className = 'clip-card';

    const badge = document.createElement('div');
    badge.className = 'final-badge';
    badge.textContent = 'FINAL';
    card.appendChild(badge);

    const wrap = document.createElement('div');
    wrap.className = 'clip-video-wrap';
    wrap.appendChild(makeVideoEl(path));

    const footer = document.createElement('div');
    footer.className = 'clip-footer';
    const nameEl = document.createElement('span');
    nameEl.className = 'clip-name';
    const parts = path.replace('\\', '/').split('/');
    nameEl.textContent = formatClipName(parts[parts.length - 1].replace('_final.mp4', ''));
    footer.appendChild(nameEl);

    card.appendChild(wrap);
    card.appendChild(footer);
    return card;
  }

  function formatClipName(name) {
    const m = name.match(/clip_(\d+)_(\d+)m(\d+)s/);
    if (m) return `Game ${m[1]}  ·  ${m[2]}:${m[3].padStart(2, '0')}`;
    return name;
  }

  // ── archived section ──────────────────────────────────────────
  function renderArchived(titles) {
    const section = document.getElementById('archivedSection');
    const toggle  = document.getElementById('archivedToggle');
    const list    = document.getElementById('archivedList');

    if (titles.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    toggle.textContent = `ARCHIVED (${titles.length})`;
    toggle.classList.toggle('has-items', titles.length > 0);

    list.innerHTML = '';
    titles.forEach(title => {
      const row = document.createElement('div');
      row.className = 'archived-row';

      const name = document.createElement('span');
      name.textContent = title;
      row.appendChild(name);

      const btn = document.createElement('button');
      btn.className = 'restore-btn';
      btn.textContent = 'RESTORE';
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = '...';
        const res = await fetch(`/unarchive/${encodeURIComponent(title)}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          await loadClips(title);
        } else {
          btn.disabled = false;
          btn.textContent = 'RESTORE';
          alert('Restore failed: ' + (data.error || 'unknown'));
        }
      });
      row.appendChild(btn);
      list.appendChild(row);
    });
  }

  function toggleArchived() {
    document.getElementById('archivedList').classList.toggle('open');
  }

  // ── archive ───────────────────────────────────────────────────
  async function archiveSession() {
    if (allSessions.length === 0) return;
    const session = allSessions[currentSessionIdx];
    if (!confirm(`Archive "${session.title}"?\n\nIt will be moved to clips/archived/ and removed from the review list.`)) return;
    const btn = document.getElementById('archiveBtn');
    btn.disabled = true;
    try {
      const res = await fetch(`/archive/${encodeURIComponent(session.title)}`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        await loadClips(null);
      } else {
        alert('Archive failed: ' + (data.error || 'unknown error'));
      }
    } catch (e) {
      alert('Archive request failed.');
    }
    btn.disabled = false;
  }

  // ── key shortcuts ─────────────────────────────────────────────
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startPipeline();
  });
</script>
